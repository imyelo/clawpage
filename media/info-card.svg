<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050A" />
      <stop offset="50%" stop-color="#0B0B14" />
      <stop offset="100%" stop-color="#141424" />
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)" />
  <rect width="1200" height="600" fill="url(#grid)" />

  <!-- Ambient Glow -->
  <circle cx="200" cy="500" r="300" fill="#3B82F6" opacity="0.15" filter="blur(100px)" />
  <circle cx="1000" cy="100" r="350" fill="#8B5CF6" opacity="0.15" filter="blur(120px)" />
  <circle cx="600" cy="300" r="250" fill="#10B981" opacity="0.05" filter="blur(80px)" />

  <!-- Left Content -->
  <g transform="translate(100, 180)">
    <!-- Pill -->
    <g transform="translate(0, -40)">
      <rect width="130" height="36" rx="18" fill="rgba(99, 102, 241, 0.15)" stroke="rgba(99, 102, 241, 0.3)" stroke-width="1.5" />
      <text x="65" y="23" fill="#A5B4FC" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="600" text-anchor="middle" letter-spacing="0.5">/clawpage</text>
    </g>

    <!-- Title -->
    <text x="0" y="50" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="76" font-weight="800" letter-spacing="-1.5">Clawpage.</text>

    <!-- Subtitle -->
    <text x="0" y="115" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="400">
      Turn <tspan fill="#E2E8F0" font-weight="600">OpenClaw</tspan> conversations
    </text>
    <text x="0" y="160" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="400">
      into polished archive web pages.
    </text>

    <!-- Features Grid -->
    <g transform="translate(0, 220)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#F8FAFC" font-weight="500">
      <g transform="translate(0, 0)">
        <rect width="220" height="48" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.06)" />
        <text x="20" y="30">🔀 <tspan dx="8" fill="#E2E8F0">Review with PR</tspan></text>
      </g>
      <g transform="translate(240, 0)">
        <rect width="220" height="48" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.06)" />
        <text x="20" y="30">🚀 <tspan dx="8" fill="#E2E8F0">Publish with Git</tspan></text>
      </g>
      <g transform="translate(0, 64)">
        <rect width="220" height="48" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.06)" />
        <text x="20" y="30">🧠 <tspan dx="8" fill="#E2E8F0">Full Fidelity Traces</tspan></text>
      </g>
      <g transform="translate(240, 64)">
        <rect width="220" height="48" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.06)" />
        <text x="20" y="30">🛡️ <tspan dx="8" fill="#E2E8F0">AI Auto-Redaction</tspan></text>
      </g>
    </g>
  </g>

  <!-- Right Graphic: 2-Step Cascading Flow -->
  <g transform="translate(580, 25)">

    <!-- 1. YAML Review Window -->
    <g transform="translate(30, 70)">
      <rect width="340" height="220" rx="16" fill="#0F172A" stroke="rgba(139, 92, 246, 0.4)" stroke-width="1.5" filter="url(#shadow)" />
      <path d="M0 16 C0 7.163 7.163 0 16 0 L324 0 C332.837 0 340 7.163 340 16 L340 36 L0 36 Z" fill="rgba(139, 92, 246, 0.15)" />
      <!-- Window controls -->
      <circle cx="16" cy="18" r="4" fill="#EF4444" />
      <circle cx="30" cy="18" r="4" fill="#F59E0B" />
      <text x="170" y="23" fill="#C4B5FD" font-family="-apple-system, sans-serif" font-size="12" font-weight="500" text-anchor="middle">git diff chats/sharing-tool.yaml</text>

      <!-- YAML Content -->
      <g transform="translate(25, 65)" font-family="'JetBrains Mono', monospace" font-size="13">
        <text x="0" y="0" fill="#38BDF8">title:</text> <text x="55" y="0" fill="#A3E635">"Sharing Tool"</text>
        <text x="0" y="24" fill="#38BDF8">model:</text> <text x="55" y="24" fill="#A3E635">"MiniMax-M2.5"</text>
        <text x="0" y="48" fill="#8B5CF6">timeline:</text>
        <text x="12" y="72" fill="#94A3B8">-</text> <text x="24" y="72" fill="#38BDF8">type:</text> <text x="64" y="72" fill="#A3E635">"message"</text>

        <!-- Redacted highlight -->
        <rect x="24" y="86" width="220" height="24" rx="4" fill="rgba(239, 68, 68, 0.2)" />
        <text x="24" y="103" fill="#38BDF8">content:</text> <text x="95" y="103" fill="#FCA5A5">"[REDACTED]"</text>
      </g>
    </g>

    <!-- 2. Deployed Webpage Window (mimicking screenshot.png) -->
    <g transform="translate(80, 210)">
      <!-- Main body background: extremely dark gray to match screenshot -->
      <rect width="470" height="330" rx="12" fill="#121212" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" filter="url(#shadow)" />

      <!-- Decorative radial gradient on background to mimic website subtle glow -->
      <circle cx="235" cy="50" r="130" fill="#3B82F6" opacity="0.04" filter="blur(40px)" />
      <circle cx="100" cy="180" r="130" fill="#9D4EDD" opacity="0.03" filter="blur(50px)" />

      <!-- Topbar / Header -->
      <g transform="translate(30, 20)">
        <text x="0" y="10" fill="#52525B" font-family="monospace" font-size="9">← ARCHIVE</text>
        <rect x="310" y="-2" width="100" height="18" rx="2" fill="transparent" stroke="rgba(255,255,255,0.08)" />
        <circle cx="320" cy="7" r="2.5" fill="#F59E0B" />
        <text x="328" y="10" fill="#A1A1AA" font-family="monospace" font-size="8">HIDE PROCESS</text>
      </g>

      <!-- Title Area -->
      <g transform="translate(30, 65)">
        <text x="0" y="0" fill="#F4F4F5" font-family="-apple-system, sans-serif" font-size="18" font-weight="600">Building a Conversation Sharing Tool</text>
        <text x="0" y="22" fill="#71717A" font-family="'JetBrains Mono', monospace" font-size="8" letter-spacing="0.5">CHANNEL Discord  •  MODEL MiniMax-M2.5  •  DATE 2026-02-19</text>
        <rect x="0" y="40" width="410" height="1" fill="rgba(255,255,255,0.05)" />
      </g>

      <!-- Message 1 (Human) -->
      <g transform="translate(30, 130)">
        <rect x="0" y="0" width="14" height="14" rx="3" fill="#3F3F46" />
        <text x="7" y="10" fill="#F4F4F5" font-size="9" font-weight="bold" text-anchor="middle" font-family="-apple-system, sans-serif">H</text>
        <text x="22" y="11" fill="#E4E4E7" font-size="10" font-weight="600" font-family="-apple-system, sans-serif">Human 1</text>
        <text x="70" y="10" fill="#52525B" font-size="8" font-family="monospace">17:10</text>

        <!-- Bubble Body -->
        <rect x="0" y="20" width="410" height="38" rx="4" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.04)" />
        <text x="14" y="40" fill="#D4D4D8" font-size="11" font-family="-apple-system, sans-serif">I want to build a conversation sharing tool. I initially considered...</text>
      </g>

      <!-- Message 2 (Agent) -->
      <g transform="translate(30, 200)">
        <rect x="0" y="0" width="14" height="14" rx="3" fill="#422006" />
        <text x="7" y="10" fill="#F59E0B" font-size="9" font-weight="bold" text-anchor="middle" font-family="-apple-system, sans-serif">A</text>
        <text x="22" y="11" fill="#E4E4E7" font-size="10" font-weight="600" font-family="-apple-system, sans-serif">Agent</text>
        <text x="60" y="10" fill="#52525B" font-size="8" font-family="monospace">01:11</text>

        <!-- Thinking Header Block -->
        <rect x="0" y="20" width="410" height="22" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.03)" />
        <text x="8" y="35" font-size="10">🧠</text>
        <text x="26" y="35" fill="#71717A" font-size="10" font-family="-apple-system, sans-serif">Thinking</text>
        <path d="M 390 29 L 395 35 L 400 29" fill="none" stroke="#71717A" stroke-width="1.5" stroke-linecap="round" />

        <!-- Response Body -->
        <rect x="0" y="44" width="410" height="36" rx="4" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.04)" />
        <text x="14" y="64" fill="#D4D4D8" font-size="11" font-family="-apple-system, sans-serif">Great idea! What features do you have in mind?</text>
      </g>
    </g>
  </g>
</svg>
